services:
  - type: web
    name: busan-flute-concours
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: content-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
